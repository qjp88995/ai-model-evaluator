  <line x1="256" y1="300" x2="256" y2="356" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="219" y1="284" x2="169" y2="316" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
  <line x1="219" y1="228" x2="169" y2="196" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
